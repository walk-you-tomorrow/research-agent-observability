    domain_enum: ["store_info", "foot_traffic", "rent", "demographics", "business_codes", "dong_summary"]
    adapter_interface: "DataRequirementExtractor"
    otel_mapping: "gen_ai.cm.query.required_data_types"

  query.tool_plan:
    description: "호출 예정 도구 목록"
    type: "list[str]"
    measurement:
      method: llm_extract
      formula: "LLM 출력 tool_plan 필드"
      independence: self_referential
      oracle: O5
      discriminability: discriminating
      composition: atomic
      threshold_status: uncalibrated
      shared_inputs: ["user_query"]
    quality_dimension: relevance
    judge_inputs: [relevance]
    tier: 3
    producer: analyze_query
    lifecycle: plan
    domain_dependency: dependent
    domain: "seoul_commercial_district"
    note: "활용 측정 후 KEEP/MERGE 재결정 (analysis/33 보류 권고)"
    otel_mapping: "gen_ai.cm.query.tool_plan"

  query.user_query:
    description: "이번 턴 사용자 질문 원문 (alignment judge 입력용)"
    type: str
    measurement:
      method: passthrough
      formula: "state['user_query'] 직접 기록"
      independence: model_free
      oracle: O1
      discriminability: non_discriminating
      composition: atomic
      threshold_status: null
      shared_inputs: []
    quality_dimension: null
    judge_inputs: []
    tier: 3
    producer: analyze_query
    lifecycle: plan
    domain_dependency: agnostic
    otel_mapping: "gen_ai.cm.query.user_query"

  query.session_continuity:
    description: "이전 N턴 intent 대비 현재 intent 방향 유사도 (User Pivot 감지)"
    type: float  # null 허용 (Turn 1, Ollama 미가용)
    measurement:
      method: embedding_similarity
      formula: "session_intent_history 최근 window턴 centroid vs 현재 intent cosine similarity"
      independence: model_free
      oracle: O1
      discriminability: discriminating
      composition: atomic
      threshold_status: calibrated  # 2026-05-28 보정 (n=73, 3패턴 × 세션)
      pivot_threshold: 0.50          # HIGH≥0.7 / DRIFT 중간 / PIVOT≤0.5 경계값
      calibration_note: >
        n=73 (HIGH 30, DRIFT 26, PIVOT 17). 서울 상권 도메인 임베딩 중심화로
        3패턴 구분력 제한: PIVOT recall 20%, HIGH false-alarm 16%.
        임계값 0.5 = 보수적 선택 (recall보다 precision 우선).
        도메인 특이성(모두 "창업 상권" 군집) — 범용 도메인에서는 재보정 필요.
      shared_inputs: ["session_intent_history"]
    quality_dimension: null
    judge_inputs: []
    tier: 2
    producer: analyze_query
    lifecycle: plan
    domain_dependency: agnostic
    otel_mapping: "gen_ai.cm.query.session_continuity"

  source.contribution:
    description: "소스별 토큰 기여 비율 {csv: 0.4, rag: 0.3, web: 0.2, api: 0.1}"
    type: dict
    measurement:
      method: composite
      formula: "tools_called에서 도구 prefix별 토큰 합 / total"
      independence: model_free
      oracle: O1
      discriminability: discriminating
      composition: composite_lossy
      threshold_status: null
      shared_inputs: ["gather.tools_called", "context.source.gathered_data_tokens"]
    quality_dimension: relevance
    judge_inputs: [relevance]
    tier: 2
    producer: evaluate_context
    lifecycle: organize
    domain_dependency: dependent           # csv/rag/web/api enum이 도메인 종속
    domain: "seoul_commercial_district"
    adapter_interface: "SourceTypeRegistry"
    otel_mapping: "gen_ai.cm.source.contribution"

  source.conflict_detected:                # ⭐ REDEFINE v2 (정량 측정)
    description: "소스 간 정보 충돌 여부 (정량 entity/수치 비교)"
    type: bool
    measurement:
      method: lookup
      formula: |
        # Step 1: groundedness_checker._extract_entities_from_text() 재사용
        # Step 2: gathered_data 항목 중 같은 entity 언급 페어 추출
        # Step 3: 수치 차이 > numeric_diff_threshold(5%) 또는 카테고리 mismatch
      independence: model_free
      oracle: O2
      discriminability: discriminating
      composition: atomic
      threshold_status: domain_dependent
      shared_inputs: ["gathered_data"]
    quality_dimension: consistency
    consistency_pattern: B
    judge_inputs: [consistency]
    tier: 2
    producer: evaluate_context              # generate_analysis에서 evaluate_context로 이동 (정량 검출)
    lifecycle: organize
    domain_dependency: dependent
    domain: "seoul_commercial_district"
    adapter_interface: "ConflictDetector"
    redefine_history:
      v1: "LLM 추출 (47/47 False ceiling)"
      v2_2026-04-28: "groundedness_checker entity 매칭 + 정량 비교"
    customization_guide: "수치 차이 임계값 (도메인별 다름) + entity 추출 패턴"
    otel_mapping: "gen_ai.cm.source.conflict_detected"

  gather.tools_called:
    description: "실제 호출 도구 목록 (도구 이름)"
    type: "list[str]"
    measurement:
      method: lookup
      formula: "gather_data 노드에서 호출 도구 이름 집계"
      independence: model_free
      oracle: O1
      discriminability: discriminating
      composition: atomic
      threshold_status: null
      shared_inputs: []
    quality_dimension: relevance
    judge_inputs: [relevance]
    tier: 1
    producer: gather_data
    lifecycle: collect
    domain_dependency: dependent           # 도구 이름이 도메인 종속
    domain: "seoul_commercial_district"
    domain_enum: ["pandas_query", "calculate", "rag_search", "rag_deep_read", "rag_global_summary", "rag_compare", "lookup_previous", "web_search", "api_query"]
    otel_mapping: "gen_ai.tool.name (per-call list view; OTel은 span별 단일값)"

  gather.api_called:
    description: "호출된 API 키 (예: commercial_change)"
    type: str
    measurement:
      method: lookup
      formula: "api_query 호출 시 사용 API 키"
      independence: model_free
      oracle: O1
      discriminability: discriminating
      composition: atomic
      threshold_status: null
      shared_inputs: []
    quality_dimension: null
    judge_inputs: []
    tier: 2
    producer: gather_data
    lifecycle: collect
    domain_dependency: dependent
    domain: "seoul_commercial_district"
    note: "tools_called에서 도출 불가 (API 키 정보가 없음). 별도 attribute 유지."
