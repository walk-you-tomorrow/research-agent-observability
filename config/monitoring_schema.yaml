      threshold_status: null
      shared_inputs: ["response.final_text", "gathered_data"]
    quality_dimension: consistency
    consistency_pattern: D
    judge_inputs: [consistency]
    tier: 2
    producer: groundedness_checker
    lifecycle: memory
    domain_dependency: partial
    otel_mapping: "gen_ai.cm.response.ungrounded_claims"

# ─────────────────────────────────────────────────────────────
# 5.2 DOMAIN ATTRIBUTES (서울 상권 도메인 의존, 어댑터 분리)
# 다른 도메인 적용 시 어댑터 교체 필요. Track C-2 어댑터 인터페이스로 분리 예정.
# ─────────────────────────────────────────────────────────────

domain_attributes:

  query.intent:
    description: "사용자 의도 (LLM 분류)"
    type: str
    measurement:
      method: llm_extract
      formula: "analyze_query LLM 출력의 intent 필드"
      independence: self_referential
      oracle: O5
      discriminability: discriminating
      composition: atomic
      threshold_status: uncalibrated
      shared_inputs: ["user_query"]
    quality_dimension: relevance
    judge_inputs: [completeness, relevance]
    tier: 3
    producer: analyze_query
    lifecycle: plan
    domain_dependency: dependent
    domain: "seoul_commercial_district"
    adapter_interface: "QueryIntentClassifier"
    customization_guide: "도메인 의도 분류 + 한국어 LLM 프롬프트 어휘 변경"
    otel_mapping: "gen_ai.cm.query.intent"

  query.references_previous_turn:
    description: "이전 턴 참조 여부"
    type: bool
    measurement:
