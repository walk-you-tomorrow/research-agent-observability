  context.truncated_items:                 # ⭐ 구조 변경 (truncation_reasons 통합)
    description: "잘린 항목 [{source, reason}]"
    type: "list[dict]"                     # 기존 list[str] → list[dict]
    measurement:
      method: pattern_match
      formula: "[truncated] 포함 항목의 {source, reason} dict 리스트"
