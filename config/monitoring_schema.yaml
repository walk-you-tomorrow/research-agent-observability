      conditional: "referenced_turns > 0"
    quality_dimension: consistency
    consistency_pattern: B
    judge_inputs: [consistency]
    tier: 2
    producer: generate_analysis
    lifecycle: generate
    domain_dependency: agnostic
    nullable: true
    redefine_history:
      v1: "utilized / referenced (0/0 무의미)"
      v2_2026-04-28: "referenced > 0 조건부, null 허용"
    otel_mapping: "gen_ai.cm.analysis.conclusion_utilization"

  analysis.conflict_tracking:                # ⭐ REDEFINE v2 (3개 통합)
    description: "이전 턴 결론과 모순 추적 (정량 매칭, contradicts_previous + contradiction_resolved + previous_conclusion 통합)"
    type: dict
    measurement:
      method: composite
      formula: |
        # Step 1: utilized_conclusions의 이전 결론 key_claims 추출
        # Step 2: groundedness_checker._extract_entities_from_text()로 entity 추출
        # Step 3: 이전 결론 entity vs 현재 analysis output entity 매칭
        # Step 4: 매칭된 entity별 수치 차이 > numeric_diff_threshold(5%) 또는 카테고리 mismatch
        # Step 5: detection_score = (모순 entity) / (매칭 entity)
        # Step 6: detected = detection_score > conflict_detection_threshold(0.1)
        # Step 7: detected=True 시 resolution dict 추출
      independence: model_free
      oracle: O2
      discriminability: discriminating  # ceiling 회피 (연속형 detection_score)
      composition: composite_lossless
      threshold_status: domain_dependent  # config 외부화
      shared_inputs: ["analysis.utilized_conclusions", "analysis_output", "turn_conclusions"]
    quality_dimension: consistency
    consistency_pattern: B
    judge_inputs: [consistency]
    tier: 2
    producer: generate_analysis
    lifecycle: generate
    domain_dependency: agnostic
    schema:
      detection_score:                # 0~1, 연속형 (분포 측정 가능)
        type: float
        description: "모순 entity 비율"
      detected:                       # detection_score > threshold
        type: bool
      affected_entities:              # 모순 감지된 entity 리스트
        type: "list[str] | null"
      affected_turn_numbers:          # 영향받은 이전 턴
        type: "list[int] | null"
      resolution:                     # detected=True 시만
        type: "dict | null"
        sub_schema:
          has_explanation: bool       # 해명 마커 존재
          markers_found: "list[str]"  # 발견된 마커
          conflict_summary: str       # 모순 이전 결론 요약
    redefine_history:
      v1_3_attributes:
        - analysis.contradicts_previous (LLM, 47/47 False ceiling)
        - analysis.contradiction_resolved (transitive)
        - analysis.previous_conclusion (transitive)
      v2_2026-04-28: "단일 dict로 통합. Boolean → 연속형 detection_score. multi-collinearity 해소."
    customization_guide: |
      도메인별 변경 필요:
      - numeric_diff_threshold (수치 차이 %) — 수치 종류별 다를 수 있음
      - conflict_detection_threshold (감지 비율) — false positive/negative trade-off
      - 해명 마커 리스트 ('그러나/하지만/조정/재해석') — 언어/도메인 의존
    otel_mapping: "gen_ai.cm.analysis.conflict_tracking"

