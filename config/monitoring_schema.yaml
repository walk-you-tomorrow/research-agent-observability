# config/monitoring_schema_v3.yaml — Context Monitoring Framework Schema v3.0
#
# ★ 본 파일은 88개 → 67개 합리화 + 8개 축 통합 + Portable Core 분리 ★
#
# 역사적 진화:
#   v1.0 (2026-03): 초기 82개 attribute
#   v2.0 (2026-04-09): 4D 재정의 + Phase 2 신규 속성 (88개)
#   v3.0 (2026-04-28): A-13 분류 + A-8 합리화 + Portable Core 분리 (67개)
#
# 변경 이력:
#   - 21개 폐기 (Tier 4 변별력 0 + derived + 활용 0 + 의미 중복)
#   - 9개 REDEFINE (정의 명확화 + 정량 측정 전환 + 통합)
#   - 11개 통합 (analysis.conflict_tracking이 3개 흡수)
#   - 8개 축 메타데이터 추가 (analysis/32 분류)
#   - core / domain / partial 분류 (Track C-1 대비)
#
# 참고:
#   - analysis/29: framing 정정 (Framework 추출 본업)
#   - analysis/31: 4D 재정의 (효율성=자원, 일관성 패턴 D=groundedness)
#   - analysis/32: 8개 축 분류
#   - analysis/33: 합리화 결정 (폐기 21 + REDEFINE 9)

# ═══════════════════════════════════════════════════════════════
# 1. 메타 정보
# ═══════════════════════════════════════════════════════════════

schema:
  version: "3.0"
  released: "2026-04-28"
  framework_role: "Context Monitoring Framework — Reference Implementation"
  domain_reference: "seoul_commercial_district"
  rationalized_from: 88
  current_count: 70  # Phase 3.7 +5 (query.user_query, query.session_continuity, analysis.summary, analysis.query_alignment, response.query_alignment)
  documents:
    framing: "docs/analysis/29-PROJECT-DIRECTION-RESET.md"
    4d_redefinition: "docs/analysis/31-4D-REDEFINITION.md"
    classification: "docs/analysis/32-ATTRIBUTE-CLASSIFICATION.md"
    rationalization: "docs/analysis/33-ATTRIBUTE-RATIONALIZATION.md"

# ═══════════════════════════════════════════════════════════════
# 2. 공통 상수
# ═══════════════════════════════════════════════════════════════

constants:
  context_window:
    max_tokens: 180000              # Claude 컨텍스트 윈도우
    rot_gate_threshold: 0.3         # Rot Gate 발동 임계값

  thresholds:
    completeness: 0.7
    efficiency: 0.7
    relevance: 0.7
    consistency: 0.7
    groundedness: 0.7

  # fidelity_score 구성 가중치 (evaluate_context.py + charts.py SSOT)
  fidelity_score_weights:
    cond_score: 0.4             # 조건보존 비율
    claims_ratio: 0.3           # 주장 보존 비율
    compression_penalty: 0.3    # 압축 적절성

  # 도메인 customization 가능 임계값 (config 외부화)
  customizable_thresholds:
    numeric_diff_threshold: 0.05    # 수치 차이 임계값 (5%)
    redundancy_cosine_threshold: 0.85  # 의미 중복 cosine 임계값
    conflict_detection_threshold: 0.1  # 충돌 비율 임계값
    domain_dependent: true          # 다른 도메인 적용 시 재보정 필요

  # session_continuity 계산 윈도우 (query.session_continuity 전용)
  # 현재 intent와 비교할 이전 턴 intent 최대 개수. 값이 클수록 장기 맥락 반영.
  session_continuity_window: 5

  # 대시보드 UI 임계값 SSOT (Tab 3 '구성' / Tab 5 '전달' 공통)
  # 코드에 하드코딩하지 말고 DASHBOARD_THRESHOLDS["키"]로 참조할 것.
  dashboard_thresholds:
    # Tab 3 Hero — Previous Turns 토큰 점유 비율 경고
    previous_turns_warn: 0.25     # 이 비율 초과 시 Rot 1차 신호 (st.warning)
    previous_turns_danger: 0.50   # 이 비율 초과 시 즉시 조치 필요 (st.error)
    # context.window_utilization 색상 분기 (40~85% OPTIMAL)
    window_optimal_min: 0.40
    window_optimal_max: 0.85
    # context.noise_ratio / redundancy_ratio 경고 임계값
    noise_warn: 0.50              # impact.py와 SSOT 공유
    redundancy_warn: 0.85         # customizable_thresholds.redundancy_cosine_threshold와 정합
    # Tab 4 변형 — fidelity_score 색상 분기 (good >= 0.8, warn >= 0.5, else bad)
    fidelity_good: 0.80
    fidelity_warn: 0.50
    # Tab 4 변형 — 여정 표 new_data_ratio 색상 분기
    new_data_good: 0.30
    new_data_warn: 0.15
    # Tab 5 전달 — 여정 표 윈도우 활용률 색상 분기
    # ⚠ Tab 3 window_optimal_min/max(0.40~0.85)와 의미가 다름:
    #   Tab 3: "최적 활용 대역" (40~85% = OK)
    #   Tab 5: "전달 부담" (높을수록 컨텍스트 포화 → 부담)
    window_high_warn: 0.60       # ≥ 60% = WARN (전달 부담 시작)
    window_high_danger: 0.80     # ≥ 80% = CRIT (포화)
    # Tab 5 전달 — 여정 표 정보 밀도 색상 분기
    density_good: 0.50           # ≥ 50% = OK
    density_warn: 0.20           # ≥ 20% = WARN, 미만 = CRIT
    # Tab 5 전달 — 여정 표 노이즈 비율 색상 분기 (noise_warn=0.50와 함께 사용)
    noise_good: 0.30             # ≤ 30% = OK, ≤ noise_warn(0.50) = WARN, 초과 = CRIT
    # Tab 5 전달 — Groundedness 비율 색상 분기 (선택)
    grounded_good: 0.70          # ≥ 70% = OK
    grounded_warn: 0.50          # ≥ 50% = WARN, 미만 = CRIT

# ═══════════════════════════════════════════════════════════════
# 3. Cross-model 평가 모델 명세 (verify.interpretation_score용)
# ═══════════════════════════════════════════════════════════════

cross_model_evaluators:
  interpretation_judge:
    model: "claude-haiku-4-5-20251001"
    prompt_version: "v1"
    note: "verify.interpretation_score (bypass=false) 사용. Agent와 다른 모델로 self-referential 회피."
  alignment_judge:
    model: "claude-haiku-4-5-20251001"
    prompt_version: "v1"
    note: "analysis.query_alignment / response.query_alignment judge. Agent(haiku)와 다른 모델로 self-referential 회피."

# ═══════════════════════════════════════════════════════════════
# 4. 일관성 패턴 D (Groundedness 통합)
# ═══════════════════════════════════════════════════════════════

consistency_patterns:
  A:
    name: "Iteration 내"
    description: "재수집 전후 신뢰도 변화"
    attributes: [context.confidence_delta, context.missing_info_resolved]
  B:
    name: "턴 간 모순"
    description: "이전 턴 결론 vs 현재 턴 분석"
    attributes: [analysis.conflict_tracking, source.conflict_detected]
  C:
    name: "Memory→Organize 충실도"
    description: "저장된 결론 vs 다음 컨텍스트"
    attributes: [context.fidelity_score, context.fidelity_detail, response.lost_claims, response.key_claims_preserved]
  D:
    name: "답변↔컨텍스트"
    description: "Groundedness — 답변이 컨텍스트에 근거"
    attributes: [response.grounded_claim_ratio, response.hallucination_detected, response.ungrounded_claims]

# ═══════════════════════════════════════════════════════════════
# 5. Attribute 정의 — Core / Domain / Partial 3분류
# ═══════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────
# 5.1 CORE ATTRIBUTES (도메인 무관, Portable Core 후보)
# 다른 AI Agent에 그대로 적용 가능. Track C-1 코어 모듈로 분리 예정.
# ─────────────────────────────────────────────────────────────

core_attributes:

  # ═══ turn 네임스페이스 — 세션 메타 (4개) ═══
  turn.number:
    description: "턴 번호"
    type: int
    measurement:
      method: count
      formula: "main.py turn loop counter"
      independence: model_free
      oracle: O1
      discriminability: discriminating
      composition: atomic
      threshold_status: null
      shared_inputs: []
    quality_dimension: null
    judge_inputs: []
    tier: 1
    producer: main
    lifecycle: meta
    domain_dependency: agnostic
    otel_mapping: "gen_ai.cm.turn.number"

  turn.wall_time_ms:
    description: "턴 실행 시간 (밀리초)"
    type: int
    measurement:
      method: arithmetic
      formula: "end_time - start_time (ms)"
      independence: model_free
      oracle: O1
      discriminability: discriminating
      composition: atomic
      threshold_status: uncalibrated
      shared_inputs: []
    quality_dimension: efficiency
    judge_inputs: [efficiency]
    tier: 2
    producer: main
    lifecycle: meta
    domain_dependency: agnostic
    otel_mapping: "gen_ai.client.operation.duration (단위 변환 필요)"

  turn.tool_call_count:
    description: "턴 전체 도구 호출 횟수 (재시도 포함)"
    type: int
    measurement:
      method: count
      formula: "len(tools_called) + retries"
      independence: model_free
      oracle: O1
      discriminability: discriminating
      composition: atomic
      threshold_status: uncalibrated
      shared_inputs: ["gather.tools_called"]
    quality_dimension: efficiency
    judge_inputs: [efficiency]
    tier: 2
    producer: main
    lifecycle: meta
    domain_dependency: agnostic
    otel_mapping: "derived from gen_ai.tool.name span count"

  turn.total_cost_usd:
    description: "턴 LLM API 총 비용 (USD)"
    type: float
    measurement:
      method: arithmetic
      formula: "input_tokens × input_price + output_tokens × output_price"
      independence: model_free
      oracle: O1
      discriminability: discriminating
      composition: composite_lossless
      threshold_status: uncalibrated
      shared_inputs: ["llm_usage"]
    quality_dimension: efficiency
    judge_inputs: [efficiency]
    tier: 2
    producer: main
    lifecycle: meta
    domain_dependency: agnostic
    otel_mapping: "gen_ai.usage.cost"

  # ═══ eval 네임스페이스 — Post-loop 진단 (2개) ═══
  eval.diagnosis:
    description: "4D 품질 진단 결과 [{dimension, score, diagnosis, suggestion}]"
    type: "list[dict]"
    measurement:
      method: composite
      formula: "diagnose_quality() 규칙 + 4D 점수 조합"
      independence: model_free
      oracle: O3
      discriminability: discriminating
      composition: composite_lossy
      threshold_status: uncalibrated
      shared_inputs: ["completeness_score", "efficiency_score", "relevance_score", "consistency_score"]
    quality_dimension: null
    judge_inputs: []
    tier: 2
    producer: diagnosis
    lifecycle: post_evaluation
    domain_dependency: agnostic
    otel_mapping: "gen_ai.cm.eval.diagnosis"

  eval.improvement_applied:
    description: "이전 턴 진단 기반 개선 적용 여부"
    type: bool
    measurement:
      method: threshold_check
      formula: "이전 FAIL 차원이 현재 PASS(>=0.7)로 회복"
      independence: model_free
      oracle: O1
      discriminability: discriminating
      composition: atomic
      threshold_status: calibrated
      shared_inputs: ["prev_4d_scores", "current_4d_scores"]
    quality_dimension: null
    judge_inputs: []
    tier: 1
    producer: main
    lifecycle: post_evaluation
    domain_dependency: agnostic
    otel_mapping: "gen_ai.cm.eval.improvement_applied"

  # ═══ verify 네임스페이스 — 검증 체크포인트 (4개, 1개 REDEFINE) ═══
  verify.numeric_check_passed:
    description: "수치 검증 통과 여부 (pandas 재계산 기반)"
    type: bool
    measurement:
      method: lookup
      formula: "pandas 수치 재계산 vs 분석 수치 비교 (불일치 0건이면 True)"
      independence: model_free
      oracle: O2
      discriminability: discriminating
      composition: atomic
      threshold_status: calibrated
      shared_inputs: ["analysis_numbers", "csv_data"]
    quality_dimension: completeness
    judge_inputs: [completeness]
    tier: 1
    producer: verify_result
    lifecycle: checkpoint
    domain_dependency: agnostic
    otel_mapping: "gen_ai.cm.verify.numeric_check_passed"

  verify.numeric_discrepancies:
    description: "수치 불일치 건수"
    type: int
    measurement:
      method: count
      formula: "pandas vs 분석 수치 불일치 항목 수"
      independence: model_free
      oracle: O2
      discriminability: discriminating
      composition: atomic
      threshold_status: calibrated
      shared_inputs: ["analysis_numbers", "csv_data"]
    quality_dimension: null
    judge_inputs: []
    tier: 1
    producer: verify_result
    lifecycle: checkpoint
    domain_dependency: agnostic
    otel_mapping: "gen_ai.cm.verify.numeric_discrepancies"

  verify.interpretation_score:                # ⭐ REDEFINE v2
    description: "해석 충실도 점수 (bypass 시 규칙 기반, 비-bypass 시 cross-model)"
    type: float
    measurement:
      method: composite
      formula: |
        if bypass=true:
          numeric_check_passed × 0.6 + key_claims_preserved × 0.4
        else:
          cross_model_evaluators.interpretation_judge 호출
      independence: model_free  # bypass 모드. 비-bypass 시 cross_model.
      oracle: O3
      discriminability: discriminating
      composition: composite_lossy
      threshold_status: calibrated
      shared_inputs: ["verify.numeric_check_passed", "response.key_claims_preserved"]
    quality_dimension: null
    judge_inputs: []
    tier: 2
    producer: verify_result
    lifecycle: checkpoint
    domain_dependency: agnostic
    redefine_history:
      v1: "LLM 자기참조 (self_referential, O5) — 47/47 ceiling 위험"
      v2_2026-04-28: "bypass 시 규칙 기반 + 비-bypass 시 cross-model 명시"
    otel_mapping: "gen_ai.cm.verify.interpretation_score"

  verify.overall_verdict:
    description: "최종 판정 (pass/fail_numeric/fail_interpretation)"
    type: str
    measurement:
      method: composite
      formula: "numeric_check_passed + interpretation_score 종합 분기"
      independence: model_free
      oracle: O3
      discriminability: discriminating
      composition: composite_lossless
      threshold_status: calibrated
      shared_inputs: ["verify.numeric_check_passed", "verify.interpretation_score"]
    quality_dimension: null
    judge_inputs: []
    tier: 2
    producer: verify_result
    lifecycle: checkpoint
    domain_dependency: agnostic
    otel_mapping: "gen_ai.cm.verify.overall_verdict"

  verify.issues:
    description: "발견된 문제점 (최대 5건)"
    type: "list[str]"
    measurement:
      method: composite
      formula: "수치 + 해석 검증에서 발견된 문제 리스트 (최대 5건)"
      independence: model_free
      oracle: O3
      discriminability: discriminating
      composition: composite_lossless
      threshold_status: null
      shared_inputs: ["verify.numeric_discrepancies", "verify.interpretation_score"]
    quality_dimension: null
    judge_inputs: []
    tier: 2
    producer: verify_result
    lifecycle: checkpoint
    domain_dependency: agnostic
    otel_mapping: "gen_ai.cm.verify.issues"

  # ═══ gather 네임스페이스 — 수집 메타 (5개) ═══
  gather.items_collected:
    description: "수집 항목 수"
    type: int
    measurement:
      method: count
      formula: "도구 호출 결과 항목 수 합산"
      independence: model_free
      oracle: O1
      discriminability: discriminating
      composition: atomic
      threshold_status: null
      shared_inputs: ["tool_results"]
    quality_dimension: completeness
    judge_inputs: [relevance]
    tier: 1
    producer: gather_data
    lifecycle: collect
    domain_dependency: agnostic
    otel_mapping: "gen_ai.cm.gather.items_collected"

  gather.items_excluded:
    description: "관련성 필터링으로 제외된 항목 수"
    type: int
    measurement:
      method: count
      formula: "필터링 제외 항목 카운트"
      independence: model_free
      oracle: O1
      discriminability: discriminating
      composition: atomic
      threshold_status: null
      shared_inputs: ["tool_results", "filter_rules"]
    quality_dimension: relevance
    judge_inputs: [relevance]
    tier: 2
    producer: gather_data
    lifecycle: collect
    domain_dependency: agnostic
    otel_mapping: "gen_ai.cm.gather.items_excluded"

  gather.excluded_items:
    description: "제외된 소스 목록"
    type: "list[str]"
    measurement:
      method: lookup
      formula: "제외 항목 소스명 리스트"
      independence: model_free
      oracle: O1
      discriminability: discriminating
      composition: atomic
      threshold_status: null
      shared_inputs: []
    quality_dimension: relevance
    judge_inputs: [relevance]
    tier: 2
    producer: gather_data
    lifecycle: collect
    domain_dependency: agnostic
    otel_mapping: "gen_ai.cm.gather.excluded_items"

  gather.exclusion_reasons:
    description: "제외 항목의 소스+사유 [{source, reason}]"
    type: "list[dict]"
    measurement:
      method: lookup
      formula: "{source, reason} 딕셔너리 리스트"
      independence: model_free
      oracle: O1
      discriminability: discriminating
      composition: composite_lossless
      threshold_status: null
      shared_inputs: []
    quality_dimension: relevance
    judge_inputs: [relevance]
    tier: 2
    producer: gather_data
    lifecycle: collect
    domain_dependency: agnostic
    otel_mapping: "gen_ai.cm.gather.exclusion_reasons"

  gather.iteration:
    description: "수집 반복 횟수 (1=initial, 2+=supplement)"
    type: int
    measurement:
      method: count
      formula: "AgentState.gather_iteration"
      independence: model_free
      oracle: O1
      discriminability: discriminating
      composition: atomic
      threshold_status: null
      shared_inputs: []
    quality_dimension: null
    judge_inputs: []
    tier: 2
    producer: gather_data
    lifecycle: collect
    domain_dependency: agnostic
    otel_mapping: "gen_ai.cm.gather.iteration"

  # ═══ context 네임스페이스 — 컨텍스트 평가 (대부분 core, 19개) ═══
  context.total_tokens:
    description: "총 토큰 수"
    type: int
    measurement:
      method: arithmetic
      formula: "sum(system + query_analysis + gathered_data + previous_turns)"
      independence: model_free
      oracle: O1
      discriminability: discriminating
      composition: composite_lossless
      threshold_status: null
      shared_inputs: ["context.source.*"]
    quality_dimension: efficiency
    judge_inputs: [efficiency]
    tier: 1
    producer: evaluate_context
    lifecycle: organize
    domain_dependency: agnostic
    otel_mapping: "gen_ai.usage.input_tokens (부분)"

  context.window_utilization:
    description: "컨텍스트 윈도우 사용률"
    type: float
    measurement:
      method: ratio
      formula: "total_tokens / context_window.max_tokens"
      independence: model_free
      oracle: O1
      discriminability: discriminating
      composition: composite_lossy
      threshold_status: calibrated
      shared_inputs: ["context.total_tokens"]
    quality_dimension: efficiency
    judge_inputs: [efficiency]
    tier: 2
    producer: evaluate_context
    lifecycle: organize
    domain_dependency: agnostic
    otel_mapping: "gen_ai.cm.context.window_utilization"

  context.source.system_prompt_tokens:
    description: "시스템 프롬프트 토큰 수 (Dashboard 토큰 구성 시각화용)"
    type: int
    measurement:
      method: count
      formula: "tiktoken(system_prompt)"
      independence: model_free
      oracle: O1
      discriminability: unverified           # 거의 고정값
      composition: atomic
      threshold_status: null
      shared_inputs: []
    quality_dimension: efficiency
    judge_inputs: [efficiency]
    tier: 2
    producer: evaluate_context
    lifecycle: organize
    domain_dependency: agnostic
    purpose: "dashboard_visualization"
    otel_mapping: "gen_ai.cm.context.source.system_prompt_tokens"

  context.source.query_analysis_tokens:
    description: "질의 분석 결과 토큰 수 (Dashboard 토큰 구성 시각화용)"
    type: int
    measurement:
      method: count
      formula: "tiktoken(json(query_analysis))"
      independence: model_free
      oracle: O1
      discriminability: unverified           # 변동 폭 좁음
      composition: atomic
      threshold_status: null
      shared_inputs: []
    quality_dimension: efficiency
    judge_inputs: [efficiency]
    tier: 2
    producer: evaluate_context
    lifecycle: organize
    domain_dependency: agnostic
    purpose: "dashboard_visualization"
    otel_mapping: "gen_ai.cm.context.source.query_analysis_tokens"

  context.source.gathered_data_tokens:
    description: "수집 데이터 토큰 수"
    type: int
    measurement:
      method: count
      formula: "tiktoken(json(gathered_data))"
      independence: model_free
      oracle: O1
