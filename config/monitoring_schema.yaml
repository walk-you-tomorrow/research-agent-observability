    description: "참조된 결론 중 활용된 비율 (referenced_turns > 0 시만)"
    type: "float | null"
    measurement:
      method: ratio
      formula: |
        if len(referenced_turns) > 0:
          len(utilized_conclusions) / len(referenced_turns)
        else: null
      independence: model_free
      oracle: O1
      discriminability: discriminating
      composition: composite_lossy
      threshold_status: null
