      formula: "evaluate_context LLM 출력의 is_sufficient 필드"
      independence: self_referential
      oracle: O5
      discriminability: discriminating
      composition: atomic
      threshold_status: uncalibrated
      shared_inputs: ["gathered_data", "query_analysis"]
    quality_dimension: completeness
    judge_inputs: [completeness]
    tier: 3
    producer: evaluate_context
    lifecycle: checkpoint
    domain_dependency: dependent           # LLM 프롬프트의 도메인 어휘
    domain: "seoul_commercial_district"
    adapter_interface: "SufficiencyJudge"
    note: "should_continue_gather 분기 결정에 직접 사용 (graph.py)"
    otel_mapping: "gen_ai.cm.context.is_sufficient"

  context.missing_info:
    description: "부족한 정보 설명 (LLM)"
    type: str
    measurement:
      method: llm_extract
      formula: "evaluate_context LLM 출력의 missing_info 필드"
      independence: self_referential
      oracle: O5
      discriminability: discriminating
      composition: atomic
      threshold_status: null
      shared_inputs: ["gathered_data", "query_analysis"]
    quality_dimension: completeness
    judge_inputs: [completeness]
    tier: 3
    producer: evaluate_context
    lifecycle: checkpoint
    domain_dependency: dependent
