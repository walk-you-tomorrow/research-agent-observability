    structure_change_history:
      v2: "list[str] (소스명만)"
      v3_2026-04-28: "list[dict] {source, reason} 통합 (구 truncation_reasons 흡수)"
    otel_mapping: "gen_ai.cm.context.truncated_items"

  source.selection_reasoning:
    description: "소스 선택 근거 (LLM 텍스트, 디버깅용)"
    type: str
    measurement:
      method: llm_extract
      formula: "analyze_query LLM 출력 reasoning 필드"
      independence: self_referential
