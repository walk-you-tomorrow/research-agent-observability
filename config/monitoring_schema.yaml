      independence: self_referential
      oracle: O5
      discriminability: discriminating
      composition: atomic
      threshold_status: null
      shared_inputs: ["user_query"]
    quality_dimension: null
    judge_inputs: []
    tier: 3
    producer: analyze_query
    lifecycle: plan
    domain_dependency: dependent
    domain: "seoul_commercial_district"
    otel_mapping: "gen_ai.cm.query.references_previous_turn"

  query.required_data_types:
    description: "필요한 CSV 데이터 키 (도메인 의존 enum)"
    type: "list[str]"
    measurement:
      method: llm_extract
      formula: "LLM 출력 required_data 필드"
      independence: self_referential
      oracle: O5
      discriminability: discriminating
      composition: atomic
      threshold_status: uncalibrated
      shared_inputs: ["user_query"]
    quality_dimension: completeness
    judge_inputs: [completeness]
    tier: 3
    producer: analyze_query
    lifecycle: plan
    domain_dependency: dependent
