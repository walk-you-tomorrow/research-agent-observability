      formula: "analysis_result['summary'] 앞 3000자"
      independence: self_referential
      oracle: O5
      discriminability: non_discriminating
      composition: atomic
      threshold_status: null
      shared_inputs: []
    quality_dimension: null
    judge_inputs: []
    tier: 3
    producer: generate_analysis
    lifecycle: generate
    domain_dependency: agnostic
    otel_mapping: "gen_ai.cm.analysis.summary"

  # ═══ 이탈 감지 속성 (Phase 3.7) ═══

  analysis.query_alignment:
    description: "분석 결과가 사용자 쿼리에 정렬된 정도 (Agent Drift 감지)"
    type: float
    measurement:
      method: llm_judge
      formula: "relevance judge — 입력: user_query + analysis_result"
      independence: cross_model
      oracle: O4
      discriminability: discriminating
      composition: atomic
      threshold_status: calibrated  # 2026-05-28 보정 (n=49)
      pass_threshold: 0.70           # mean=0.802, median=0.850, pass율=92%
      calibration_note: >
        n=49. mean=0.802, median=0.850, p25=0.700, min=0.300.
        <0.7: 4건(8%), >=0.7: 45건(92%). 기존 0.7 임계값 유효 확인.
      shared_inputs: ["query.user_query", "analysis.summary"]
    quality_dimension: relevance
    judge_inputs: []
    tier: 1
    producer: run_evaluation
    lifecycle: post_evaluation
    domain_dependency: agnostic
    otel_mapping: "gen_ai.cm.analysis.query_alignment"

  response.query_alignment:
    description: "최종 응답이 사용자 쿼리에 정렬된 정도 (Agent Drift 감지)"
    type: float
    measurement:
      method: llm_judge
      formula: "relevance judge — 입력: user_query + response_text"
      independence: cross_model
      oracle: O4
      discriminability: discriminating
      composition: atomic
      threshold_status: calibrated  # 2026-05-28 보정 (n=50)
      pass_threshold: 0.70           # mean=0.772, median=0.850, pass율=86%
      calibration_note: >
        n=50. mean=0.772, median=0.850, p25=0.750, min=0.100.
        <0.7: 7건(14%), >=0.7: 43건(86%). 기존 0.7 임계값 유효 확인.
        analysis보다 분산 다소 큼 — 응답 단계 품질 변동성 반영.
      shared_inputs: ["query.user_query", "response.final_text"]
    quality_dimension: relevance
    judge_inputs: []
    tier: 1
    producer: run_evaluation
    lifecycle: post_evaluation
    domain_dependency: agnostic
    otel_mapping: "gen_ai.cm.response.query_alignment"

# ─────────────────────────────────────────────────────────────
# 5.3 PARTIAL DEPENDENT ATTRIBUTES (핵심은 무관, 일부 도메인 어휘)
# 핵심 알고리즘은 portable, 어휘만 도메인별 customization
# ─────────────────────────────────────────────────────────────

partial_dependent_attributes:

  context.redundancy_ratio:                # ⭐ REDEFINE v2 (임베딩 기반)
    description: "소스 간 의미 중복 비율 (임베딩 cosine 기반)"
    type: float
    measurement:
      method: embedding_similarity         # 신규 method type
      formula: |
        # Step 1: gathered_data 항목 임베딩 (lightrag_adapter의 nomic-embed-text)
        # Step 2: 페어별 cosine similarity
        # Step 3: cosine ≥ redundancy_cosine_threshold(0.85) 페어 / 전체 페어
        # 캐싱: 동일 텍스트 임베딩 재요청 방지
      independence: model_free
      oracle: O2
      discriminability: discriminating
      composition: composite_lossy
      threshold_status: domain_dependent
      shared_inputs: ["gathered_data"]
    quality_dimension: efficiency
    judge_inputs: [efficiency]
    tier: 2
    producer: evaluate_context
    lifecycle: organize
    domain_dependency: partial
    portable_part: "임베딩 + cosine 알고리즘"
    domain_part: "한국어 텍스트 (임베딩 모델은 다국어 지원)"
    redefine_history:
      v1: "Jaccard 키워드 set (의미 동의어 놓침)"
      v2_2026-04-28: "임베딩 cosine 기반 의미적 측정"
    customization_guide: |
      도메인별 변경:
      - cosine 임계값 (0.85) — 도메인 검증 후 보정
      - 임베딩 모델 (nomic-embed-text) — 다른 언어/도메인은 다른 모델

