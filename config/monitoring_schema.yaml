      - name: analysis.contradicts_previous
        reason: "통합: analysis.conflict_tracking.detected에 흡수"
      - name: analysis.contradiction_resolved
        reason: "통합: analysis.conflict_tracking.resolution.has_explanation에 흡수"
      - name: analysis.previous_conclusion
        reason: "통합: analysis.conflict_tracking.resolution.conflict_summary에 흡수"
      # 의미 중복 - 다수
      - name: web.result_count
        reason: "MERGE: gather.items_collected에 흡수"
      - name: web.search_count
        reason: "운영 가치 약함 (gather.iteration이 더 정확한 추적)"
      - name: query.referenced_turn_numbers
        reason: "MERGE: references_previous_turn(boolean)으로 충분"
      - name: source.conflict_resolution
        reason: "통합: analysis.conflict_tracking.resolution에 흡수"
      - name: source.types_selected
        reason: "MERGE: gather.tools_called에서 도출"
      - name: analysis.claims_count
        reason: "단순 카운트, response.grounded_claim_ratio가 더 직접"
      - name: analysis.data_references_count
        reason: "단순 카운트, source.contribution이 더 강함"
      - name: gather.api_response_count
        reason: "MERGE: gather.items_collected에 흡수"
      - name: gather.strategy
        reason: "Judge 입력 X, gather.iteration으로 충분 (initial vs supplement 구분)"
